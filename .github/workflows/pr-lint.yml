name: PR Validation

# Enforces contribution standards on every pull request:
#   1. PR title follows Conventional Commits (feat/fix/chore/docs/etc.)
#   2. PR body is not empty (at least 20 characters)
#   3. Forks cannot trigger privileged workflows (security boundary)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  title-lint:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            security
          requireScope: false
          subjectPattern: ^.{10,100}$
          subjectPatternError: |
            PR title subject must be between 10 and 100 characters.

  body-check:
    name: PR Body Not Empty
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR body length
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ ${#PR_BODY} -lt 20 ]; then
            echo "::error::PR description must be at least 20 characters. Please describe your changes."
            exit 1
          fi

  fork-guard:
    name: Fork PR Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Block privileged secrets on fork PRs
        if: github.event.pull_request.head.repo.fork == true
        run: |
          echo "::warning::This PR originates from a fork. Privileged secrets are not available and docker push will be skipped."
