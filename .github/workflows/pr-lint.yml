name: PR Validation

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  title-lint:
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            security
          requireScope: false
          subjectPattern: '^.{10,100}$'
          subjectPatternError: 'PR title subject must be between 10 and 100 characters.'
          ignoreLabels: |
            bot
            dependabot
            ignore-semantic-pull-request

  body-check:
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate or update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '').trim();

            if (body.length >= 20) {
              core.info('PR body is valid.');
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100
              }
            );

            const names = files.map(function (file) {
              return file.filename;
            });

            const adrFiles = names.filter(function (name) {
              return name.startsWith('adr/') && name.endsWith('.md');
            });

            const adrOnly = names.length > 0 && adrFiles.length === names.length;

            if (!adrOnly) {
              core.setFailed('PR description must be at least 20 characters. Please describe your changes.');
              return;
            }

            const lines = [
              'This pull request introduces or modifies the following ADR files:',
              ''
            ];

            adrFiles.forEach(function (name) {
              lines.push('- ' + name);
            });

            lines.push('');
            lines.push('Auto-generated description to satisfy the repository minimum PR description requirement.');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: lines.join('
')
            });

            core.info('PR body was auto-filled for an ADR-only pull request.');

  fork-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Warn for fork PRs
        if: github.event.pull_request.head.repo.fork == true
        run: echo "::warning::This pull request originates from a fork. Privileged secrets are not available."