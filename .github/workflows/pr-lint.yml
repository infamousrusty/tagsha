name: PR Validation

# Enforces contribution standards on every pull request:
#   1. PR title follows Conventional Commits (feat/fix/chore/docs/etc.)
#   2. PR body is not empty (at least 20 characters)
#   3. Forks cannot trigger privileged workflows (security boundary)
#   4. Skips validation for trusted bot accounts to prevent pipeline lockups

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  title-lint:
    name: Conventional Commit Title
    # Skip this entire job if the PR was created by a standard bot
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            security
          requireScope: false
          subjectPattern: ^.{10,100}$
          subjectPatternError: |
            PR title subject must be between 10 and 100 characters.
          # Additionally ignore any PR labeled as 'bot' or 'dependabot'
          ignoreLabels: |
            bot
            dependabot
            ignore-semantic-pull-request

  body-check:
    name: PR Body Not Empty
    # Skip body check for bots, as their body content is dynamically generated
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      body-check:
    name: PR Body Not Empty
    # Skip body check for bots, as their body content is dynamically generated
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check and Auto-Fill PR Description
        uses: actions/github-script@v7
        with:
          script: |
            // 1. Get the current PR body (default to empty string if null)
            const prBody = context.payload.pull_request.body || '';
            
            // 2. If it already meets your 20-character rule, pass immediately
            if (prBody.length >= 20) {
              console.log("PR body length is sufficient.");
              return;
            }
            
            // 3. Fetch the list of changed files in this Pull Request
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            // 4. Check if the PR contains your ADR files
            const adrFiles = files.filter(f => f.filename.startsWith('adr/') && f.filename.endsWith('.md'));
            
            if (adrFiles.length > 0) {
              console.log("Found ADR files. Auto-generating PR description...");
              
              // 5. Build a dynamic markdown list of the changed ADRs
              const fileList = adrFiles.map(f => `- `${f.filename}``).join('
');
              const newBody = `This Pull Request introduces or modifies the following Architecture Decision Records (ADRs):

${fileList}

*Auto-generated description to meet the repository 20-character minimum requirement.*`;
              
              // 6. Update the PR body via GitHub API
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: newBody
              });
              
              console.log("Successfully updated PR description.");
            } else {
              // 7. If it's NOT an ADR PR, fail exactly like your old script did
              core.setFailed("PR description must be at least 20 characters. Please describe your changes.");
            }

  fork-guard:
    name: Fork PR Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Block privileged secrets on fork PRs
        if: github.event.pull_request.head.repo.fork == true
        run: |
          echo "::warning::This PR originates from a fork. Privileged secrets are not available and docker push will be skipped."