name: PR Validation

# Enforces contribution standards on every pull request:
#   1. PR title follows Conventional Commits (feat/fix/chore/docs/etc.)
#   2. PR body is not empty (at least 20 characters), unless auto-filled for ADR-only PRs
#   3. Forks cannot trigger privileged workflows (security boundary)
#   4. Skips validation for trusted bot accounts to prevent pipeline lockups

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  title-lint:
    name: Conventional Commit Title
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            security
          requireScope: false
          subjectPattern: ^.{10,100}$
          subjectPatternError: |
            PR title subject must be between 10 and 100 characters.
          ignoreLabels: |
            bot
            dependabot
            ignore-semantic-pull-request

  body-check:
    name: PR Body Not Empty
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check and auto-fill PR description for ADR changes
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';

            if (prBody.trim().length >= 20) {
              core.info('PR body length is sufficient.');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const adrFiles = files
              .filter(file => file.filename.startsWith('adr/') && file.filename.endsWith('.md'))
              .map(file => file.filename);

            if (adrFiles.length > 0) {
              const fileList = adrFiles.map(name => `- `${name}``).join('
');
              const newBody = [
                'This pull request introduces or modifies the following Architecture Decision Records (ADRs):',
                '',
                fileList,
                '',
                '*Auto-generated description to meet the repository minimum description requirement.*'
              ].join('
');

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: newBody
              });

              core.info('Successfully updated PR description for ADR pull request.');
              return;
            }

            core.setFailed(
              'PR description must be at least 20 characters. Please describe your changes.'
            );

  fork-guard:
    name: Fork PR Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Block privileged secrets on fork PRs
        if: github.event.pull_request.head.repo.fork == true
        run: |
          echo "::warning::This PR originates from a fork. Privileged secrets are not available and docker push will be skipped."