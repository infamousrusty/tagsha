name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@v4 # v4.5.0
        with:
          fail-on-severity: moderate
