name: Apply License Headers
run-name: Apply license headers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  pull-requests: write # Required to create the PR

concurrency:
  group: apply-license-headers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-license-headers:
    name: Apply SPDX headers
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Apply headers
        shell: bash
        run: |
          set -Eeuo pipefail

          YEAR="$(date +%Y)"
          AUTHOR="infamousrusty"

          # 1. Create the Hash-style header block (Python, Shell, YAML, TF)
          HASH_TMP="$(mktemp)"
          echo "# SPDX-License-Identifier: LGPL-3.0-or-later" > "$HASH_TMP"
          echo "# Copyright (C) $YEAR $AUTHOR" >> "$HASH_TMP"
          echo "" >> "$HASH_TMP"

          # 2. Create the Slash-style header block (Go, JS, TS)
          SLASH_TMP="$(mktemp)"
          echo "// SPDX-License-Identifier: LGPL-3.0-or-later" > "$SLASH_TMP"
          echo "// Copyright (C) $YEAR $AUTHOR" >> "$SLASH_TMP"
          echo "" >> "$SLASH_TMP"

          # 3. Process Hash-style extensions safely
          find . -type f "(" -name "*.py" -o -name "*.sh" -o -name "*.yml" -o -name "*.yaml" -o -name "*.tf" ")" \
            -not -path '*/.*' -not -path '*/node_modules/*' -print0 | \
          while IFS= read -r -d '' file; do
            if grep -q "SPDX-License-Identifier" "$file"; then
              continue
            fi
            
            first_line="$(head -n 1 "$file" || true)"
            tmp_file="$(mktemp)"
            
            if echo "$first_line" | grep -q "^#!"; then
              head -n 1 "$file" > "$tmp_file"
              echo "" >> "$tmp_file"
              cat "$HASH_TMP" >> "$tmp_file"
              tail -n +2 "$file" >> "$tmp_file"
            else
              cat "$HASH_TMP" > "$tmp_file"
              cat "$file" >> "$tmp_file"
            fi
            
            mv "$tmp_file" "$file"
          done

          # 4. Process Slash-style extensions safely
          find . -type f "(" -name "*.go" -o -name "*.js" -o -name "*.ts" ")" \
            -not -path '*/.*' -not -path '*/node_modules/*' -print0 | \
          while IFS= read -r -d '' file; do
            if grep -q "SPDX-License-Identifier" "$file"; then
              continue
            fi
            
            tmp_file="$(mktemp)"
            cat "$SLASH_TMP" > "$tmp_file"
            cat "$file" >> "$tmp_file"
            mv "$tmp_file" "$file"
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(license): apply SPDX headers"
          title: "chore: apply missing SPDX license headers"
          body: |
            Automated PR to apply missing SPDX license headers.
            
            This PR was generated by the `Apply License Headers` GitHub Actions workflow.
          branch: "chore/update-license-headers"
          delete-branch: true
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"