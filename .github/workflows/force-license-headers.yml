name: Apply License Headers
run-name: Apply license headers on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.py'
      - '**/*.sh'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.tf'
      - '**/*.go'
      - '**/*.js'
      - '**/*.ts'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'

permissions:
  contents: write

concurrency:
  group: apply-license-headers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-license-headers:
    name: Apply SPDX headers
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Apply headers
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from __future__ import annotations

          import os
          from datetime import datetime, timezone
          from pathlib import Path

          YEAR = str(datetime.now(timezone.utc).year)
          AUTHOR = "infamousrusty"

          HASH_EXTS = {".py", ".sh", ".yml", ".yaml", ".tf"}
          SLASH_EXTS = {".go", ".js", ".ts"}
          EXCLUDED_DIRS = {
              ".git",
              "node_modules",
              ".venv",
              "venv",
              "dist",
              "build",
              "vendor",
          }

          HASH_HEADER = "
".join(
              [
                  "# SPDX-License-Identifier: LGPL-3.0-or-later",
                  f"# Copyright (C) {YEAR} {AUTHOR}",
              ]
          )

          SLASH_HEADER = "
".join(
              [
                  "// SPDX-License-Identifier: LGPL-3.0-or-later",
                  f"// Copyright (C) {YEAR} {AUTHOR}",
              ]
          )

          changed_files: list[str] = []

          def should_skip_dir(path: Path) -> bool:
              return any(part in EXCLUDED_DIRS for part in path.parts)

          def has_spdx(text: str) -> bool:
              first_lines = "
".join(text.splitlines()[:20])
              return "SPDX-License-Identifier:" in first_lines

          def apply_header(path: Path, header: str) -> bool:
              original = path.read_text(encoding="utf-8", errors="surrogateescape")

              if has_spdx(original):
                  return False

              lines = original.splitlines(keepends=True)

              if lines and lines[0].startswith("#!"):
                  shebang = lines[0]
                  rest = "".join(lines[1:])
                  new_content = f"{shebang}
{header}

{rest}"
              else:
                  new_content = f"{header}

{original}"

              if new_content == original:
                  return False

              path.write_text(new_content, encoding="utf-8", errors="surrogateescape")
              return True

          for path in Path(".").rglob("*"):
              if not path.is_file() or path.is_symlink():
                  continue

              if should_skip_dir(path):
                  continue

              suffix = path.suffix.lower()

              if suffix in HASH_EXTS:
                  if apply_header(path, HASH_HEADER):
                      changed_files.append(path.as_posix())
              elif suffix in SLASH_EXTS:
                  if apply_header(path, SLASH_HEADER):
                      changed_files.append(path.as_posix())

          if changed_files:
              print("Updated files:")
              for file in changed_files:
                  print(file)
          else:
              print("No files needed updates.")
          PY

      - name: Commit changes
        shell: bash
        run: |
          set -Eeuo pipefail

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(license): apply SPDX headers [skip ci]"
          git push