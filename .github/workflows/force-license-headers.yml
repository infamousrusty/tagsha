name: Apply License Headers
run-name: Apply license headers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write

concurrency:
  group: apply-license-headers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-license-headers:
    name: Apply SPDX headers
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply headers
        shell: bash
        run: |
          set -Eeuo pipefail

          YEAR="$(date +%Y)"
          AUTHOR="infamousrusty"

          # 1. Create the Hash-style header block (Python, Shell, YAML, TF)
          HASH_TMP="$(mktemp)"
          echo "# SPDX-License-Identifier: LGPL-3.0-or-later" > "$HASH_TMP"
          echo "# Copyright (C) $YEAR $AUTHOR" >> "$HASH_TMP"
          echo "" >> "$HASH_TMP"

          # 2. Create the Slash-style header block (Go, JS, TS)
          SLASH_TMP="$(mktemp)"
          echo "// SPDX-License-Identifier: LGPL-3.0-or-later" > "$SLASH_TMP"
          echo "// Copyright (C) $YEAR $AUTHOR" >> "$SLASH_TMP"
          echo "" >> "$SLASH_TMP"

          # 3. Process Hash-style extensions safely using quoted parentheses
          find . -type f "(" -name "*.py" -o -name "*.sh" -o -name "*.yml" -o -name "*.yaml" -o -name "*.tf" ")" \
            -not -path '*/.*' -not -path '*/node_modules/*' -print0 | \
          while IFS= read -r -d '' file; do
            if grep -q "SPDX-License-Identifier" "$file"; then
              continue
            fi
            
            first_line="$(head -n 1 "$file" || true)"
            tmp_file="$(mktemp)"
            
            # Check for shebang safely
            if echo "$first_line" | grep -q "^#!"; then
              head -n 1 "$file" > "$tmp_file"
              echo "" >> "$tmp_file"
              cat "$HASH_TMP" >> "$tmp_file"
              tail -n +2 "$file" >> "$tmp_file"
            else
              cat "$HASH_TMP" > "$tmp_file"
              cat "$file" >> "$tmp_file"
            fi
            
            mv "$tmp_file" "$file"
          done

          # 4. Process Slash-style extensions safely using quoted parentheses
          find . -type f "(" -name "*.go" -o -name "*.js" -o -name "*.ts" ")" \
            -not -path '*/.*' -not -path '*/node_modules/*' -print0 | \
          while IFS= read -r -d '' file; do
            if grep -q "SPDX-License-Identifier" "$file"; then
              continue
            fi
            
            tmp_file="$(mktemp)"
            cat "$SLASH_TMP" > "$tmp_file"
            cat "$file" >> "$tmp_file"
            mv "$tmp_file" "$file"
          done

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A
          git commit -m "chore(license): apply SPDX headers [skip ci]"
          git push