#!/usr/bin/env bash
set -Eeuo pipefail

YEAR="2026"
AUTHOR="(infamousrusty)"

read -r -d '' HASH_HEADER <<EOF || true
# SPDX-License-Identifier: GPL-3.0-or-later
#
# Copyright (C) $YEAR $AUTHOR
#
# This program is free software: you can redistribute it and/or modify
# it under the terms of the GNU General Public License as published by
# the Free Software Foundation, either version 3 of the License, or
# (at your option) any later version.
#
# This program is distributed in the hope that it will be useful,
# but WITHOUT ANY WARRANTY; without even the implied warranty of
# MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
# GNU General Public License for more details.
#
# You should have received a copy of the GNU General Public License
# along with this program.  If not, see <https://www.gnu.org/licenses/>.
EOF

read -r -d '' SLASH_HEADER <<EOF || true
// SPDX-License-Identifier: GPL-3.0-or-later
//
// Copyright (C) $YEAR $AUTHOR
//
// This program is free software: you can redistribute it and/or modify
// it under the terms of the GNU General Public License as published by
// the Free Software Foundation, either version 3 of the License, or
// (at your option) any later version.
//
// This program is distributed in the hope that it will be useful,
// but WITHOUT ANY WARRANTY; without even the implied warranty of
// MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
// GNU General Public License for more details.
//
// You should have received a copy of the GNU General Public License
// along with this program.  If not, see <https://www.gnu.org/licenses/>.
EOF

hash_exts=(py sh yml yaml tf)
slash_exts=(go js ts)

tmp_files=()

cleanup() {
    local f
    for f in "${tmp_files[@]:-}"; do
        [[ -n "${f:-}" && -e "$f" ]] && rm -f -- "$f"
    done
}
trap cleanup EXIT

build_find_expr() {
    local -n exts_ref=$1
    local expr=()
    local first=1
    local ext

    expr+=( "(" )
    for ext in "${exts_ref[@]}"; do
        if (( first )); then
            expr+=( -name "*.${ext}" )
            first=0
        else
            expr+=( -o -name "*.${ext}" )
        fi
    done
    expr+=( ")" )

    printf '%s
' "${expr[@]}"
}

add_header() {
    local file=$1
    local header_type=$2
    local tmp_file
    local first_line

    if grep -q "SPDX-License-Identifier" "$file"; then
        return 0
    fi

    tmp_file="$(mktemp)"
    tmp_files+=("$tmp_file")

    echo "Fixing $file..."

    first_line="$(head -n 1 "$file" || true)"
    if [[ $first_line == '#!'* ]]; then
        head -n 1 "$file" > "$tmp_file"
        printf '
' >> "$tmp_file"
        if [[ $header_type == "hash" ]]; then
            printf '%s
' "$HASH_HEADER" >> "$tmp_file"
        else
            printf '%s
' "$SLASH_HEADER" >> "$tmp_file"
        fi
        printf '
' >> "$tmp_file"
        tail -n +2 "$file" >> "$tmp_file"
    else
        if [[ $header_type == "hash" ]]; then
            printf '%s
' "$HASH_HEADER" > "$tmp_file"
        else
            printf '%s
' "$SLASH_HEADER" > "$tmp_file"
        fi
        printf '
' >> "$tmp_file"
        cat "$file" >> "$tmp_file"
    fi

    mv -- "$tmp_file" "$file"

    local i
    for i in "${!tmp_files[@]}"; do
        if [[ ${tmp_files[$i]} == "$tmp_file" ]]; then
            unset 'tmp_files[i]'
            break
        fi
    done
}

process_group() {
    local header_type=$1
    shift
    local exts=("$@")
    local find_expr=()
    local file

    mapfile -t find_expr < <(build_find_expr exts)

    find . -type f \
        ( "${find_expr[@]:1:${#find_expr[@]}-2}" ) \
        -not -path '*/.*' \
        -not -path '*/node_modules/*' \
        -print0 |
    while IFS= read -r -d '' file; do
        add_header "$file" "$header_type"
    done
}

process_group "hash"  "${hash_exts[@]}"
process_group "slash" "${slash_exts[@]}"