name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Backend — tidy, lint, vet
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go 1.22
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.22'
          cache: false

      - name: go mod tidy
        run: go mod tidy

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8 # v6.1.1
        with:
          version: v1.64.8
          args: --config ../.github/golangci.yml --timeout 5m
          working-directory: backend

  # ---------------------------------------------------------------------------
  # Backend — unit tests with race detector
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: [self-hosted, linux, x64]
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go 1.22
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.22'
          cache: false

      - name: go mod tidy
        run: go mod tidy

      - name: Unit tests (race detector + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v4.6.0
        with:
          files: backend/coverage.out
          flags: backend
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Frontend — type-check, lint, test, build
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend Tests
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 22
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Security — Gosec SAST, Trivy filesystem secret scan
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scanning
    runs-on: [self-hosted, linux, x64]
    needs: [backend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go 1.22
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.22'

      - name: Resolve Go module dependencies
        working-directory: backend
        run: |
          go mod tidy
          go mod download

      - name: Install Gosec
        run: |
          curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh \
            | sh -s -- -b "${HOME}/.local/bin" v2.21.4
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Gosec SAST
        working-directory: backend
        run: |
          gosec -fmt sarif -out gosec.sarif -exclude-dir=vendor ./...

      - name: Upload Gosec SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: gosec-sarif
          path: backend/gosec.sarif
          retention-days: 30

      - name: Install Trivy via APT
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy=0.61.0

      - name: Trivy filesystem secret scan
        run: |
          trivy fs \
            --scanners secret \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs.sarif \
            .

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Docker — build, push to GHCR, container scan (main only)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build and Push
    runs-on: [self-hosted, linux, x64]
    needs: [backend-test, frontend-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a09e11b9b1f5c4f9e7e7c6a # v5.7.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/tagsha-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install Trivy via APT
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy=0.61.0

      - name: Trivy container vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-container.sarif \
            ghcr.io/${{ github.repository_owner }}/tagsha-api:latest

      - name: Upload Trivy container SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: trivy-container-sarif
          path: trivy-container.sarif
          retention-days: 30
