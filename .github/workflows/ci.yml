name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'SemVer bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Backend — tidy, lint, vet (unchanged)
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go 1.24
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: false

      - name: go mod tidy
        run: go mod tidy

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.3
          args: --config ../.github/golangci.yml --timeout 5m
          working-directory: backend

  # ---------------------------------------------------------------------------
  # Backend — unit tests with race detector (unchanged)
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: [self-hosted, linux, x64]
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go 1.24
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'
          cache: false

      - name: go mod tidy
        run: go mod tidy

      - name: Unit tests (race detector + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v4.6.0
        with:
          files: backend/coverage.out
          flags: backend
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Frontend — type-check, lint, test, build (unchanged)
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend Tests
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Security — Gosec SAST, Trivy filesystem secret scan (unchanged)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scanning
    runs-on: [self-hosted, linux, x64]
    needs: [backend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go 1.24
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24'

      - name: Resolve Go module dependencies
        working-directory: backend
        run: |
          go mod tidy
          go mod download

      - name: Gosec SAST
        working-directory: backend
        run: |
          gosec -fmt sarif -out gosec.sarif -exclude-dir=vendor ./...

      - name: Upload Gosec SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: gosec-sarif
          path: backend/gosec.sarif
          retention-days: 30

      - name: Trivy filesystem secret scan
        run: |
          trivy fs \
            --scanners secret \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs.sarif \
            .

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Semantic Versioning & Release (on main push/manual)
  # ---------------------------------------------------------------------------
  release:
    name: Semantic Release
    runs-on: [self-hosted, linux, x64]
    needs: [backend-test, frontend-test, security-scan]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # For versioning

      - name: Semantic Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TYPE: ${{ github.event.inputs.version_type || 'patch' }}
        run: |
          # Fetch latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')
          echo "Latest tag: $LATEST_TAG"

          # Parse MAJOR.MINOR.PATCH
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)

          # Bump based on input or default
          if [ "$VERSION_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$VERSION_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else  # patch
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Tag & push
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag $NEW_VERSION
          git push origin $NEW_VERSION

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_VERSION" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Docker — build, push to GHCR, container scan (PR/main/develop/manual)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build and Push
    runs-on: [self-hosted, linux, x64]
    needs: [backend-test, frontend-test, security-scan, release]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pre-pull base images
        run: |
          docker pull golang:1.24-alpine || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
        with:
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/tagsha-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.release.outputs.version || 'dev' }},enable={{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ needs.release.outputs.version || github.sha }}

      - name: Trivy container vulnerability scan
        if: always()
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/tagsha-api:${{ steps.meta.outputs.tags }}
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-container.sarif \
            $IMAGE

      - name: Upload Trivy container SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-container-sarif
          path: trivy-container.sarif
          retention-days: 30