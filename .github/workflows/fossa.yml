name: FOSSA Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fossa:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v6 
        with:
          node-version: '20'

      - name: FOSSA Analyze
        uses: fossas/fossa-action@v1.9.0  
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: FOSSA Scan + Test
        uses: fossas/fossa-action@v1.9.0 
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true