name: ADR Compliance Pipeline

on:
  pull_request:
    paths:
      - 'adr/**/*.md'
  push:
    branches:
      - main
    paths:
      - 'adr/**/*.md'

permissions:
  contents: write
  pull-requests: read

jobs:
  validate-and-index:
    name: Validate Compliance and Update Index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: UK English Spelling Check
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: '.github/cspell.json'
          files: 'adr/**/*.md'
          strict: true

      - name: PII and Secrets Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce LGPL and GDPR Sections
        shell: bash
        run: |
          if [ ! -d "adr/" ]; then
            echo "Directory adr/ does not exist. Skipping compliance checks."
            exit 0
          fi
          echo "Scanning ADRs for compliance sections..."
          find adr/ -type f -name '*.md' -not -name 'README.md' -not -name 'template.md' | while read -r file; do
            echo "Checking: $file"
            if ! grep -qi "LGPL-3.0-or-later Evaluation" "$file"; then
              echo "::error file=$file::Missing LGPL-3.0-or-later compliance evaluation."
              exit 1
            fi
            if ! grep -qi "GDPR & PII Evaluation" "$file"; then
              echo "::error file=$file::Missing GDPR/PII compliance evaluation."
              exit 1
            fi
            echo "  -> Passed compliance check!"
          done

      - name: Set up Node.js
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest main before generating index
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: git pull --rebase origin main

      - name: Generate ADR Index
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: npx adr-log -d adr/ > adr/README.md

      - name: Commit ADR Index
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          commit_message: "docs(adr): auto-update decision log [skip ci]"
          file_pattern: adr/README.md
          commit_user_name: infamousrusty
          commit_user_email: 106888872+infamousrusty@users.noreply.github.com
          commit_author: infamousrusty <106888872+infamousrusty@users.noreply.github.com>