name: Auto ADR Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'Dockerfile'
      - 'Dockerfile.*'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'

permissions:
  contents: write

concurrency:
  group: adr-autogen-main
  cancel-in-progress: false

jobs:
  generate-adrs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate ADRs for pushed commits
        id: generate
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          mkdir -p docs/decisions

          # --- Resolve base safely ---
          if [ -z "${BASE_SHA:-}" ] || printf '%s' "$BASE_SHA" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
          fi

          COMMITS="$(git rev-list --reverse "${BASE_SHA}..${HEAD_SHA}" || true)"

          if [ -z "$COMMITS" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Skip if only ADR files changed ---
          CHANGED_FILES=$(for sha in $COMMITS; do
            git show --name-only --format= "$sha"
          done | sed '/^$/d')

          if ! printf '%s\n' "$CHANGED_FILES" | grep -qv '^docs/decisions/'; then
            echo "Only ADR changes detected — skipping"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Determine next ADR ID ---
          max_id=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            id_part="$(basename "$file" | sed -E 's/^([0-9]{4})-.*/\1/')"
            if printf '%s' "$id_part" | grep -Eq '^[0-9]{4}$'; then
              n=$((10#$id_part))
              if [ "$n" -gt "$max_id" ]; then
                max_id="$n"
              fi
            fi
          done < <(find docs/decisions -maxdepth 1 -type f -name '*.md' | sort)

          next_id() {
            max_id=$((max_id + 1))
            printf '%04d' "$max_id"
          }

          slugify() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
              | cut -c1-50
          }

          has_adr_for_commit() {
            grep -Rqs "source_commit: $1" docs/decisions 2>/dev/null
          }

          count=0

          # --- Process commits ---
          for sha in $COMMITS; do
            files="$(git show --format= --name-only "$sha" | sed '/^$/d' || true)"

            [ -n "$files" ] || continue

            # Filter relevant files only
            if ! printf '%s\n' "$files" | grep -Eq \
              '(^|/)(terraform|config|\.github/workflows)/|(^|/)Dockerfile(\..*)?$|(^|/)[^/]+\.go$|^go\.mod$'; then
              continue
            fi

            if has_adr_for_commit "$sha"; then
              continue
            fi

            id="$(next_id)"
            title="$(git show -s --format=%s "$sha" | sed 's/[[:space:]]\+/ /g')"
            slug="$(slugify "$title")"
            file="docs/decisions/${id}-${slug}.md"

            cat > "$file" <<EOF
---
adr_id: "$id"
source_commit: "$sha"
source_type: "commit"
source_run: "$RUN_URL"
status: "proposed"
---

# ADR $id: $title

## Status
proposed

## Timestamp
$(date -u '+%Y-%m-%d %H:%M UTC')

## Context
Relevant files touched:
\`\`\`
$files
\`\`\`

## Decision
accepted

## Consequences
- Provides an auditable decision record
- Generated automatically from repository history

## Review
Change the status to accepted, rejected, superseded, or deprecated when reviewed.
EOF

            count=$((count + 1))
          done

          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Commit ADRs
        if: steps.generate.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/decisions/

          if git diff --cached --quiet; then
            echo "No ADR changes to commit"
            exit 0
          fi

          git commit -m "docs(adr): auto-generate ADRs [skip ci]"
          git pull --rebase origin main

          git push origin HEAD:main