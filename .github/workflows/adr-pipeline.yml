name: Auto ADR Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'Dockerfile**'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'Dockerfile**'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'

permissions:
  contents: write
  pull-requests: write
  discussions: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      should_generate: ${{ steps.files.outputs.changed_files != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - id: files
        name: List changed files
        run: |
          CHANGED=$(git diff --name-only HEAD~1 || echo "")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  generate-adr:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_generate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get next ADR ID
        id: adr-id
        run: |
          mkdir -p docs/decisions
          cd docs/decisions
          LAST_ID=$(ls -1 *.md 2>/dev/null | sed -n 's/^0*([1-9][0-9]*)-.*/\u0001/p' | sort -n | tail -1 || echo "0")
          NEXT_ID=$(printf "%04d" $((LAST_ID + 1)))
          echo "next_id=$NEXT_ID" >> $GITHUB_OUTPUT
      
      - name: Create ADR content
        id: adr-file
        env:
          TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message || 'Untriaged changes' }}
          FILES: ${{ needs.detect-changes.outputs.changed_files }}
        run: |
          ADR_FILE="docs/decisions/${{ steps.adr-id.outputs.next_id }}-$(echo '${{ env.TITLE }}' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | head -c 50).md"
          cat > "$ADR_FILE" << 'EOF'
# ADR ${{ steps.adr-id.outputs.next_id }}: Auto-generated from commit/PR

## Status
**proposed**

## Timestamp
$(date +%Y-%m-%d %H:%M UTC)

## Context
Auto-detected changes in tagsha:
```
${{ env.FILES }}
```

Trigger: ${{ env.TITLE }}

## Decision
**accepted** - auto-tracked infrastructure/code evolution

## Positive Consequences
- Concrete record of all significant changes
- No manual tracking overhead

## Review
Edit status to: accepted | rejected | superseded | deprecated
EOF
          echo "file=$ADR_FILE" >> $GITHUB_OUTPUT
      
      - name: Commit ADR
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(adr): auto ${{ steps.adr-id.outputs.next_id }} from changes [skip ci]"
          file_pattern: docs/decisions/
      
      - name: Sync ADR to Discussion
        if: always()
        uses: yujiosaka/adr-sync@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: main