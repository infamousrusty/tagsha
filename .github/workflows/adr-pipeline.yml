name: Auto-generate ADR from Changes

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: read
  discussions: write

jobs:
  analyze-changes:
    runs-on: ubuntu-latest
    outputs:
      generate: ${{ steps.changes.outputs.generate }}
      summary: ${{ steps.changes.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - id: changes
        name: Detect significant changes
        run: |
          # Check for code/infra changes, deps, Dockerfiles, workflows
          if git diff --name-only ${{ github.event.before || 'HEAD~1' }} | grep -E '(Dockerfile|docker-compose|go.mod|package.json|.github/workflows|terraform|docs/|config/)' | grep -v '^docs/decisions/'; then
            echo "generate=true" >> $GITHUB_OUTPUT
            SUMMARY=$(git diff --stat ${{ github.event.before || 'HEAD~1' }} | head -3)
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "generate=false" >> $GITHUB_OUTPUT
          fi

  generate-adr:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.generate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Get next ADR number
        id: adr-number
        run: |
          if [ -d "docs/decisions" ]; then
            LAST=$(ls docs/decisions/*.md | sort -V | tail -1 | sed 's/.*///; s/.md$//; s/[^0-9]*//g')
            NEXT=$((LAST + 1))
          else
            mkdir -p docs/decisions
            NEXT=0001
          fi
          echo "number=$NEXT" >> $GITHUB_OUTPUT
      
      - name: Generate ADR content
        id: content
        env:
          PR_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          COMMIT_SUMMARY: ${{ needs.analyze-changes.outputs.summary }}
        run: |
          cat > docs/decisions/${{ steps.adr-number.outputs.number }}-auto-generated.md << EOF
          # ADR ${{ steps.adr-number.outputs.number }}: Auto-generated from ${{ github.event.pull_request.number || 'commit' }} "$(date +%Y-%m-%d)"

          ## Status
          Proposed

          ## Context and Problem Statement
          GitHub detected changes on $(date +%Y-%m-%d):
          ```
          ${{ needs.analyze-changes.outputs.summary }}
          ```
          PR/Commit: ${{ env.PR_TITLE }}

          ## Decision Drivers
          - Auto-tracked for concrete record
          - Changes: $(git diff --name-only HEAD~1 | tr '
' ', ')

          ## Considered Options
          - Accept changes as-is (no manual ADR needed)

          ## Decision Outcome
          **Accepted** (auto-generated, review to supersede/superseded)

          ## Consequences
          Creates permanent record of infra/code evolution for tagsha.
          EOF
      
      - name: Commit ADR
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(adr): auto-generate ADR ${{ steps.adr-number.outputs.number }} from changes"
          file_pattern: 'docs/decisions/*.md'
      
      - name: Sync to Discussion
        uses: yujiosaka/adr-sync@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: main