name: Auto ADR Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'Dockerfile'
      - 'Dockerfile.*'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'

permissions:
  contents: write

concurrency:
  group: adr-autogen-main
  cancel-in-progress: false

jobs:
  generate-adrs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate ADRs for pushed commits
        id: generate
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          mkdir -p docs/decisions

          yaml_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          classify_tags() {
            local title_lower
            declare -A tags=()

            title_lower="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"

            while IFS= read -r path; do
              [ -n "$path" ] || continue

              case "$path" in
                terraform/*|*/terraform/*) tags[infra]=1 ;;
                .github/workflows/*|*/.github/workflows/*) tags[ci]=1 ;;
                config/*|*/config/*) tags[config]=1 ;;
              esac

              case "$path" in
                *.go|go.mod) tags[runtime]=1 ;;
              esac
            done

            if printf '%s' "$title_lower" | grep -Eq '(auth|security|secret|token|jwt|tls|crypto|encrypt|password|credential)'; then
              tags[security]=1
            fi

            if [ "${#tags[@]}" -eq 0 ]; then
              tags[general]=1
            fi

            printf '%s\n' "${!tags[@]}" | sort | paste -sd ', ' -
          }

          # Resolve base safely
          if [ -z "${BASE_SHA:-}" ] || printf '%s' "$BASE_SHA" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
          fi

          COMMITS="$(git rev-list --reverse "${BASE_SHA}..${HEAD_SHA}" || true)"

          if [ -z "$COMMITS" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if only ADR files changed
          CHANGED_FILES=$(for sha in $COMMITS; do
            git show --name-only --format= "$sha"
          done | sed '/^$/d')

          if ! printf '%s\n' "$CHANGED_FILES" | grep -qv '^docs/decisions/'; then
            echo "Only ADR changes detected — skipping"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine next ADR ID
          max_id=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            id_part="$(basename "$file" | sed -E 's/^([0-9]{4})-.*/\1/')"
            if printf '%s' "$id_part" | grep -Eq '^[0-9]{4}$'; then
              n=$((10#$id_part))
              if [ "$n" -gt "$max_id" ]; then
                max_id="$n"
              fi
            fi
          done < <(find docs/decisions -maxdepth 1 -type f -name '*.md' | sort)

          next_id() {
            max_id=$((max_id + 1))
            printf '%04d' "$max_id"
          }

          slugify() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
              | cut -c1-50
          }

          has_adr_for_commit() {
            grep -Rqs "source_commit: $1" docs/decisions 2>/dev/null
          }

          count=0

          for sha in $COMMITS; do
            files="$(git show --format= --name-only "$sha" | sed '/^$/d' || true)"
            [ -n "$files" ] || continue

            if ! printf '%s\n' "$files" | grep -Eq \
              '(^|/)(terraform|config|\.github/workflows)/|(^|/)Dockerfile(\..*)?$|(^|/)[^/]+\.go$|^go\.mod$'; then
              continue
            fi

            if has_adr_for_commit "$sha"; then
              continue
            fi

            id="$(next_id)"
            title="$(git show -s --format=%s "$sha" | sed 's/[[:space:]]\+/ /g')"
            slug="$(slugify "$title")"
            file="docs/decisions/${id}-${slug}.md"
            tags="$(classify_tags "$title" <<< "$files")"

            summary="$(yaml_escape "$title")"
            title_escaped="$(yaml_escape "$title")"
            tags_escaped="$(yaml_escape "$tags")"

            printf '%s\n' \
"---" \
"adr_id: \"$id\"" \
"source_commit: \"$sha\"" \
"source_type: \"commit\"" \
"source_run: \"$RUN_URL\"" \
"status: \"proposed\"" \
"tags: \"$tags_escaped\"" \
"summary: \"$summary\"" \
"---" \
"" \
"# ADR $id: $title_escaped" \
"" \
"## Status" \
"proposed" \
"" \
"## Timestamp" \
"$(date -u '+%Y-%m-%d %H:%M UTC')" \
"" \
"## Context" \
"Relevant files touched:" \
"\`\`\`" \
"$files" \
"\`\`\`" \
"" \
"## Decision" \
"accepted" \
"" \
"## Consequences" \
"- Provides an auditable decision record" \
"- Generated automatically from repository history" \
"" \
"## Review" \
"Change the status to accepted, rejected, superseded, or deprecated when reviewed." \
> "$file"

            count=$((count + 1))
          done

          if [ "$count" -gt 0 ]; then
            index_file="docs/decisions/README.md"

            {
              printf '# Decision Log\n\n'
              printf 'Auto-generated index of architecture decision records.\n\n'
              printf '| ADR | Title | Status | Tags | Source commit |\n'
              printf '| --- | --- | --- | --- | --- |\n'

              while IFS= read -r file; do
                [ -f "$file" ] || continue

                id="$(basename "$file" | sed -E 's/^([0-9]{4})-.*/\1/')"
                title="$(sed -n 's/^# ADR [0-9][0-9][0-9][0-9]: //p' "$file" | head -n1)"
                status="$(sed -n 's/^status: "\(.*\)"/\1/p' "$file" | head -n1)"
                tags="$(sed -n 's/^tags: "\(.*\)"/\1/p' "$file" | head -n1)"
                commit="$(sed -n 's/^source_commit: "\(.*\)"/\1/p' "$file" | head -n1)"

                title="${title//|/\\|}"
                status="${status//|/\\|}"
                tags="${tags//|/\\|}"

                printf '| [%s](./%s) | %s | %s | %s | `%s` |\n' \
                  "$id" \
                  "$(basename "$file")" \
                  "${title:-Untitled}" \
                  "${status:-proposed}" \
                  "${tags:-general}" \
                  "${commit:-unknown}"
              done < <(find docs/decisions -maxdepth 1 -type f -name '[0-9][0-9][0-9][0-9]-*.md' | sort)
            } > "$index_file"
          fi

          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Commit ADRs safely
        if: steps.generate.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/decisions/

          if git diff --cached --quiet; then
            echo "No ADR changes to commit"
            exit 0
          fi

          git commit -m "docs(adr): auto-generate ADRs [skip ci]"

          git fetch origin main
          git rebase origin/main

          git push origin HEAD:main