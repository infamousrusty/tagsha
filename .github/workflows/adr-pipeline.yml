name: Auto ADR Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'Dockerfile**'
      - '.github/workflows/**'
      - 'terraform/**'
  pull_request:

permissions:
  contents: write
  pull-requests: write
  discussions: write

jobs:
  auto-adr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Detect & generate ADR
        env:
          PR_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message || 'changes' }}
        run: |
          # Changed files
          CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
          
          # Skip if no relevant changes
          if [[ ! "$CHANGED" =~ (go.mod|Dockerfile|.github/workflows|terraform) ]]; then
            echo "No ADR-worthy changes"
            exit 0
          fi
          
          # Next ID
          mkdir -p docs/decisions
          pushd docs/decisions >/dev/null
          LAST=$(ls -1 [0-9]*.md 2>/dev/null | sed 's/^0*([1-9][0-9]*)-.*/\u0001/' | sort -n | tail -1 || echo 0)
          ID=$(printf "%04d" $((LAST + 1)))
          popd >/dev/null
          
          # Write ADR
          cat > "docs/decisions/${ID}-auto-${PR_TITLE//[^a-zA-Z0-9]/-}.md" << EOF
# ADR $ID: Auto-generated $(date +%Y-%m-%d)

**Status:** proposed

## Context
Auto-tracked changes:
```
$CHANGED
```

Title: $PR_TITLE

## Decision
**accepted** - permanent record created

## Pros
Concrete change history without manual work
EOF
      
      - name: Commit ADR
        uses: stefanzweifel/git-auto-commit-action@v5
        if: always()
        with:
          commit_message: "docs(adr): auto #$ID [skip ci]"
          file_pattern: 'docs/decisions/'