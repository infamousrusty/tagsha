name: Auto ADR Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'Dockerfile**'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'Dockerfile**'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'

permissions:
  contents: write
  pull-requests: write
  discussions: write

jobs:
  detect-changes:
  runs-on: ubuntu-latest
  outputs:
    changed_files: ${{ steps.files.outputs.changed_files }}
    should_generate: ${{ steps.files.outputs.changed_files != '' }}

  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - id: base
      name: Determine base SHA
      run: |
        set -euo pipefail

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
        fi

    - id: files
      name: List changed files
      run: |
        set -euo pipefail

        BASE_SHA="${{ steps.base.outputs.base_sha }}"
        HEAD_SHA="${{ github.sha }}"

        echo "Comparing: $BASE_SHA -> $HEAD_SHA"

        CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

        {
          echo "changed_files<<EOF"
          printf '%s\n' "$CHANGED"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

  generate-adr:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_generate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next ADR ID
        id: adr-id
        run: |
          set -euo pipefail
          mkdir -p docs/decisions

          LAST_ID=$(find docs/decisions -maxdepth 1 -type f -name '*.md' -printf '%f\n' 2>/dev/null \
            | sed -E 's/^([0-9]{4})-.*/\1/' \
            | sort -n \
            | tail -n 1)

          LAST_ID=${LAST_ID:-0}
          NEXT_ID=$(printf "%04d" "$((10#$LAST_ID + 1))")

          echo "next_id=$NEXT_ID" >> "$GITHUB_OUTPUT"

      - name: Create ADR content
        id: adr-file
        env:
          TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message || 'Untriaged changes' }}
          FILES: ${{ needs.detect-changes.outputs.changed_files }}
        run: |
          set -euo pipefail

          SLUG=$(printf '%s' "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-50)

          ADR_FILE="docs/decisions/${{ steps.adr-id.outputs.next_id }}-${SLUG}.md"

          cat > "$ADR_FILE" <<EOF
# ADR ${{ steps.adr-id.outputs.next_id }}: Auto-generated from commit/PR

## Status
**proposed**

## Timestamp
$(date -u '+%Y-%m-%d %H:%M UTC')

## Context
Auto-detected changes in tagsha:
\`\`\`
${FILES}
\`\`\`

Trigger: ${TITLE}

## Decision
**accepted** - auto-tracked infrastructure/code evolution

## Positive Consequences
- Concrete record of all significant changes
- No manual tracking overhead

## Review
Edit status to: accepted | rejected | superseded | deprecated
EOF

          echo "file=$ADR_FILE" >> "$GITHUB_OUTPUT"

      - name: Commit ADR
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(adr): auto ${{ steps.adr-id.outputs.next_id }} from changes [skip ci]"
          file_pattern: docs/decisions/

      - name: Sync ADR to Discussion
        if: always()
        uses: yujiosaka/adr-sync@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: main