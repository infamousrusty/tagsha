name: Auto ADR Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'Dockerfile'
      - 'Dockerfile.*'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'

permissions:
  contents: write

concurrency:
  group: adr-autogen-main
  cancel-in-progress: false

jobs:
  generate-adrs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh

      - name: Generate ADRs
        id: generate
        run: |
          COUNT=$(
            BASE_SHA="${{ github.event.before }}" \
            HEAD_SHA="${{ github.sha }}" \
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            .github/scripts/adr-generate.sh
          )
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Commit ADRs
        if: steps.generate.outputs.count != '0'
        run: .github/scripts/adr-commit.sh