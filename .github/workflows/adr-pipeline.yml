name: Auto ADR Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'Dockerfile**'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'Dockerfile**'
      - '.github/workflows/**'
      - 'terraform/**'
      - 'config/**'

permissions:
  contents: write
  pull-requests: write
  discussions: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.files.outputs.changed_files }}
      should_generate: ${{ steps.files.outputs.changed_files != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- SAFE BASE SHA RESOLUTION ---
      - id: base_push
        if: ${{ github.event_name == 'push' }}
        run: echo "base_sha=${{ github.event.before }}" >> $GITHUB_OUTPUT

      - id: base_pr
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          BASE=$(git merge-base \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")
          echo "base_sha=$BASE" >> $GITHUB_OUTPUT

      - id: files
        name: List changed files
        run: |
          set -euo pipefail

          BASE_SHA="${{ steps.base_push.outputs.base_sha || steps.base_pr.outputs.base_sha }}"
          HEAD_SHA="${{ github.sha }}"

          # fallback for edge cases
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA"^{commit} 2>/dev/null; then
            BASE_SHA=$(git rev-parse HEAD~1)
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          if [ -z "$CHANGED" ]; then
            echo "No changes detected"
            exit 0
          fi

          {
            echo "changed_files<<EOF"
            printf '%s\n' "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  generate-adr:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_generate == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get next ADR ID
        id: adr-id
        run: |
          set -euo pipefail

          mkdir -p docs/decisions

          LAST_ID=$(find docs/decisions -maxdepth 1 -type f -name '*.md' -printf '%f\n' \
            | sed -E 's/^([0-9]{4})-.*/\1/' \
            | sort -n \
            | tail -n 1)

          LAST_ID=${LAST_ID:-0}
          NEXT_ID=$(printf "%04d" "$((10#$LAST_ID + 1))")

          echo "next_id=$NEXT_ID" >> $GITHUB_OUTPUT

      - name: Create ADR
        id: adr
        env:
          TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message || 'Untriaged changes' }}
          FILES: ${{ needs.detect-changes.outputs.changed_files }}
        run: |
          set -euo pipefail

          SLUG=$(printf '%s' "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-50)

          FILE="docs/decisions/${{ steps.adr-id.outputs.next_id }}-$SLUG.md"

          cat > "$FILE" <<EOF
# ADR ${{ steps.adr-id.outputs.next_id }}: Auto-generated

## Status
proposed

## Timestamp
$(date -u '+%Y-%m-%d %H:%M UTC')

## Context
\`\`\`
${FILES}
\`\`\`

Trigger: ${TITLE}

## Decision
accepted

## Consequences
- Automated traceability
- Zero manual overhead
EOF

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Commit ADR
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(adr): auto ${{ steps.adr-id.outputs.next_id }} [skip ci]"
          file_pattern: docs/decisions/

      - name: Sync ADR
        if: always()
        uses: yujiosaka/adr-sync@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: main