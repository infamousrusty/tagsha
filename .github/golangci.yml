version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gocyclo
    - bodyclose
    - noctx
    - gosec
    - misspell
    - unconvert
    - unparam

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
    gocyclo:
      min-complexity: 20
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104

  exclusions:
    rules:
      - path: _test.go
        linters: [errcheck, gosec, unparam]

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 10