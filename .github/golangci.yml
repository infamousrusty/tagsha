run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocyclo
    - bodyclose
    - noctx
    - gosec
    - misspell
    - unconvert
    - unparam
    - gofmt

linters-settings:
  gocyclo:
    min-complexity: 20
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104  # unhandled errors in deferred calls: acceptable for cache metrics

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gosec]
  max-issues-per-linter: 50
  max-same-issues: 10
