global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: tagsha
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: tagsha-api
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
