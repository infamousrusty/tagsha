version: 3

project:
  id: TAGSHA
  name: TAGSHA

analysis:
  license_scan: true
  quality_scan: true

policy:
  licenses:
    allow:
      - MIT
      - Apache-2.0
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
      - MPL-2.0
      - LGPL-3.0-or-later

    deny:
      - GPL-3.0
      - AGPL-3.0
      - SSPL-1.0
      - Commons-Clause

  issues:
    # Dependency quality thresholds
    max: 0